backend:
  name: github
  repo: dimarus222/KMKK
  branch: main

media_folder: "assets/images/uploads"
public_folder: "/KMKK/assets/images/uploads"

collections:
  - name: "pages"
    label: "Страницы"
    files:
      - file: "content/pages/home.md"
        label: "Главная страница"
        name: "home"
        fields:
          - {label: "Заголовок", name: "title", widget: "string"}
          - {label: "Подзаголовок", name: "subtitle", widget: "string"}
          - {label: "О парламенте", name: "about_text", widget: "markdown"}
          - {label: "Цитата", name: "quote_text", widget: "text"}
          - {label: "Автор цитаты", name: "quote_author", widget: "string"}
          - label: "Достижения"
            name: "achievements"
            widget: "list"
            fields:
              - {label: "Название", name: "title", widget: "string"}
              - {label: "Значение", name: "value", widget: "string"}
              - {label: "Описание", name: "description", widget: "text"}
          - label: "Направления"
            name: "directions"
            widget: "list"
            fields:
              - {label: "Название", name: "title", widget: "string"}
              - {label: "Описание", name: "description", widget: "text"}
              - {label: "Иконка", name: "icon", widget: "string"}

  - name: "cadets"
    label: "Лучшие кадеты"
    folder: "content/cadets"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "ФИО", name: "name", widget: "string"}
      - {label: "Должность", name: "position", widget: "string"}
      - {label: "Годы", name: "years", widget: "string"}
      - {label: "Описание", name: "short_description", widget: "text"}
      - label: "Достижения"
        name: "achievements"
        widget: "list"
        fields:
          - {label: "Достижение", name: "item", widget: "text"}
      - {label: "Порядок", name: "order", widget: "number", default: 0}

  - name: "history"
    label: "История"
    folder: "content/history"
    create: true
    slug: "{{year}}-{{season}}"
    fields:
      - {label: "Год", name: "year", widget: "select", options: ["2022","2023","2024","2025","2026"]}
      - {label: "Период", name: "season", widget: "select", options: ["Осень","Зима","Весна","Лето"]}
      - {label: "Заголовок", name: "title", widget: "string"}
      - {label: "Описание", name: "description", widget: "text"}
      - {label: "Порядок", name: "order", widget: "number"}

  - name: "documents"
    label: "Документы"
    folder: "content/documents"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Название", name: "title", widget: "string"}
      - {label: "Описание", name: "description", widget: "text"}
      - {label: "Файл PDF", name: "file", widget: "file"}
      - {label: "Порядок", name: "order", widget: "number"}

  - name: "settings"
    label: "Настройки"
    files:
      - file: "content/settings/contacts.md"
        label: "Контакты"
        name: "contacts"
        fields:
          - {label: "Адрес", name: "address", widget: "text"}
          - {label: "Email", name: "email", widget: "string"}
          - {label: "Часы работы", name: "hours", widget: "string"}
          - {label: "ФИО Председателя", name: "chairman_name", widget: "string"}
          - {label: "Должность Председателя", name: "chairman_position", widget: "string"}
